<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduGenie - غير متصل</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 4rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #93c5fd; }
    p { color: #94a3b8; font-size: 0.9rem; max-width: 300px; line-height: 1.6; }
    button {
      background: #1d4ed8;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 1rem;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>أنت غير متصل بالإنترنت</h1>
  <p>تحقق من اتصالك بالإنترنت ثم حاول مرة أخرى. بعض الصفحات المخزنة مسبقاً ستعمل في وضع عدم الاتصال.</p>
  <button onclick="window.location.reload()">إعادة المحاولة</button>
</body>
</html>
